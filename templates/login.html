<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makix Studio | Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-base: #0a0a0f;
            --bg-surface: #111118;
            --bg-elevated: #1a1a24;
            --border-main: rgba(255,255,255,0.07);
            --accent-primary: #6366f1;
            --accent-glow: rgba(99,102,241,0.25);
            --text-main: #e8e8f0;
            --text-dim: #6b6b80;
            --error: #f87171;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background glow */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-main);
            border-radius: 20px;
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-ring {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-primary), #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .logo-ring svg { width: 28px; height: 28px; color: #fff; }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--text-dim);
            pointer-events: none;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.75rem 0.875rem 0.75rem 2.5rem;
            background: var(--bg-elevated);
            border: 1px solid var(--border-main);
            border-radius: 10px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn-login {
            width: 100%;
            padding: 0.875rem;
            margin-top: 0.5rem;
            background: linear-gradient(135deg, var(--accent-primary), #8b5cf6);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover { opacity: 0.9; box-shadow: 0 8px 25px var(--accent-glow); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg {
            display: none;
            align-items: center;
            gap: 0.4rem;
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 8px;
            padding: 0.6rem 0.875rem;
            font-size: 0.8rem;
            color: var(--error);
            margin-bottom: 1rem;
        }

        .error-msg.show { display: flex; }
        .error-msg svg { width: 14px; height: 14px; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo-ring">
                <i data-lucide="waves"></i>
            </div>
            <h1>Makix Studio</h1>
            <p class="subtitle">Professional AI Voice Platform</p>
        </div>

        <div class="error-msg" id="errorMsg">
            <i data-lucide="alert-circle"></i>
            <span id="errorText">Invalid credentials</span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i data-lucide="log-in"></i>
                Sign In
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            btn.disabled = true;
            errorMsg.classList.remove('show');

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    const data = await res.json();
                    errorText.textContent = data.detail || 'Invalid credentials';
                    errorMsg.classList.add('show');
                    lucide.createIcons();
                }
            } catch (err) {
                errorText.textContent = 'Connection error. Please try again.';
                errorMsg.classList.add('show');
                lucide.createIcons();
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
